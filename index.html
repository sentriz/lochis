<!doctype html>
<html lang="en">
  <head>
    <title>Create a heatmap layer</title>
    <meta
      property="og:description"
      content="Visualize earthquake frequency by location using a heatmap layer."
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
      const hash = window.location.hash.slice(1);
      const parts = hash.split("/");
      const initZoom = parts.length === 3 ? parseFloat(parts[0]) : 2;
      const initLat = parts.length === 3 ? parseFloat(parts[1]) : 51.5;
      const initLng = parts.length === 3 ? parseFloat(parts[2]) : 0;

      const map = new maplibregl.Map({
        container: "map",
        style:
          "https://api.maptiler.com/maps/basic/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL",
        center: [initLng, initLat],
        zoom: initZoom,
      });

      map.on("load", () => {
        load();
        loadData();
      });
      map.on("moveend", () => {
        loadData();
        const z = map.getZoom().toFixed(2);
        const c = map.getCenter();
        window.history.replaceState(null, "", `#${z}/${c.lat.toFixed(5)}/${c.lng.toFixed(5)}`);
      });

      function load() {
        map.addSource("history", {
          type: "geojson",
          data: { type: "FeatureCollection", features: [] },
        });
        const heatmapColor = [
          "interpolate",
          ["linear"],
          ["heatmap-density"],
          0,
          "rgba(0, 0, 255, 0)",
          0.15,
          "rgba(0, 100, 255, 0.25)",
          0.3,
          "rgba(0, 128, 255, 0.5)",
          0.5,
          "rgba(0, 255, 128, 0.6)",
          0.7,
          "rgba(255, 255, 0, 0.8)",
          1,
          "rgba(255, 0, 0, 1)",
        ];

        // low zoom: strict weights, suppresses flight paths
        map.addLayer({
          id: "heatmap-low",
          type: "heatmap",
          source: "history",
          maxzoom: 15,
          paint: {
            "heatmap-weight": [
              "interpolate",
              ["exponential", 0.5],
              ["get", "weight"],
              1, 0, 10, 0.03, 50, 0.15, 200, 0.4, 1000, 0.75, 10000, 1,
            ],
            "heatmap-intensity": [
              "interpolate", ["linear"], ["zoom"],
              0, 2, 5, 2.5, 10, 2, 15, 3,
            ],
            "heatmap-color": heatmapColor,
            "heatmap-radius": [
              "interpolate", ["linear"], ["zoom"],
              0, 12, 5, 28, 10, 30, 14, 25,
            ],
            "heatmap-opacity": [
              "interpolate", ["linear"], ["zoom"],
              0, 0.9, 14, 0.7,
            ],
          },
        });

        // high zoom: generous weights, shows individual points
        map.addLayer({
          id: "heatmap-high",
          type: "heatmap",
          source: "history",
          minzoom: 15,
          paint: {
            "heatmap-weight": [
              "interpolate",
              ["exponential", 0.5],
              ["get", "weight"],
              1, 0.1, 5, 0.2, 20, 0.4, 100, 0.6, 1000, 0.85, 10000, 1,
            ],
            "heatmap-intensity": [
              "interpolate", ["linear"], ["zoom"],
              15, 3, 18, 5,
            ],
            "heatmap-color": heatmapColor,
            "heatmap-radius": [
              "interpolate", ["linear"], ["zoom"],
              15, 20, 16, 15, 18, 10,
            ],
            "heatmap-opacity": [
              "interpolate", ["linear"], ["zoom"],
              15, 0.7, 18, 0.5,
            ],
          },
        });
      }

      let fetchController = null;
      async function loadData() {
        if (fetchController) fetchController.abort();
        fetchController = new AbortController();

        const bounds = map.getBounds();
        const zoom = map.getZoom();
        const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;

        let text;
        try {
          text = await fetch(`/history?bbox=${bbox}&zoom=${zoom}`, {
            signal: fetchController.signal,
          }).then((r) => r.text());
        } catch (e) {
          if (e.name === "AbortError") return;
          throw e;
        }

        const trimmed = text.trim();
        const features = trimmed
          ? JSON.parse("[" + trimmed.replaceAll("\n", ",") + "]")
          : [];

        map
          .getSource("history")
          .setData({ type: "FeatureCollection", features });
      }
    </script>
  </body>
</html>
