<!doctype html>
<html lang="en">
  <head>
    <title>Create a heatmap layer</title>
    <meta
      property="og:description"
      content="Visualize earthquake frequency by location using a heatmap layer."
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
      const map = new maplibregl.Map({
        container: "map",
        style:
          "https://api.maptiler.com/maps/basic/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL",
        center: [0, 51.5],
        zoom: 2,
      });

      let sourceAdded = false;
      let fetchController = null;

      async function loadData() {
        if (fetchController) fetchController.abort();
        fetchController = new AbortController();

        const bounds = map.getBounds();
        const zoom = map.getZoom();
        const bbox = [
          bounds.getWest(),
          bounds.getSouth(),
          bounds.getEast(),
          bounds.getNorth(),
        ].join(",");

        let text;
        try {
          text = await fetch(`/history?bbox=${bbox}&zoom=${zoom}`, {
            signal: fetchController.signal,
          }).then((r) => r.text());
        } catch (e) {
          if (e.name === "AbortError") return;
          throw e;
        }

        const features = text
          .trim()
          .split("\n")
          .filter(Boolean)
          .map(JSON.parse);
        const data = { type: "FeatureCollection", features };

        if (!sourceAdded) {
          map.addSource("history", { type: "geojson", data });

          map.addLayer({
            id: "heatmap",
            type: "heatmap",
            source: "history",
            paint: {
              "heatmap-weight": [
                "interpolate", ["exponential", 0.5], ["get", "weight"],
                1, 0,
                10, 0.15,
                100, 0.4,
                1000, 0.7,
                10000, 1,
              ],
              "heatmap-intensity": [
                "interpolate",
                ["linear"],
                ["zoom"],
                0, 1.5,
                5, 2,
                10, 2.5,
                15, 3,
              ],
              "heatmap-color": [
                "interpolate",
                ["linear"],
                ["heatmap-density"],
                0,
                "rgba(0, 0, 255, 0)",
                0.2,
                "rgba(0, 128, 255, 0.5)",
                0.4,
                "rgba(0, 255, 128, 0.7)",
                0.6,
                "rgba(255, 255, 0, 0.8)",
                1,
                "rgba(255, 0, 0, 1)",
              ],
              "heatmap-radius": [
                "interpolate",
                ["linear"],
                ["zoom"],
                0, 20,
                5, 35,
                10, 30,
                15, 40,
              ],
              "heatmap-opacity": [
                "interpolate",
                ["linear"],
                ["zoom"],
                0, 0.9,
                15, 0.4,
              ],
            },
          });

          sourceAdded = true;
        } else {
          map.getSource("history").setData(data);
        }
      }

      map.on("load", loadData);
      map.on("moveend", loadData);
    </script>
  </body>
</html>
