<!doctype html>
<html lang="en">
  <head>
    <title>Create a heatmap layer</title>
    <meta
      property="og:description"
      content="Visualize earthquake frequency by location using a heatmap layer."
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
      const map = new maplibregl.Map({
        container: "map",
        style:
          "https://api.maptiler.com/maps/basic/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL",
        center: [0, 51.5],
        zoom: 2,
      });

      map.on("load", async () => {
        const text = await fetch("/history").then((r) => r.text());
        const features = text.trim().split("\n").map(JSON.parse);

        map.addSource("history", {
          type: "geojson",
          data: { type: "FeatureCollection", features },
        });

        map.addLayer({
          id: "heatmap",
          type: "heatmap",
          source: "history",
          paint: {
            // Since your points don't have a weight property,
            // we'll use a constant weight or interpolate based on zoom
            "heatmap-weight": 0.4,
            "heatmap-intensity": [
              "interpolate",
              ["linear"],
              ["zoom"],
              0, 0.3,
              5, 0.8,
              10, 2,
              15, 4,
            ],
            "heatmap-color": [
              "interpolate",
              ["linear"],
              ["heatmap-density"],
              0,
              "rgba(0, 0, 255, 0)",
              0.2,
              "rgba(0, 128, 255, 0.5)",
              0.4,
              "rgba(0, 255, 128, 0.7)",
              0.6,
              "rgba(255, 255, 0, 0.8)",
              1,
              "rgba(255, 0, 0, 1)",
            ],
            "heatmap-radius": [
              "interpolate",
              ["linear"],
              ["zoom"],
              0, 8,
              5, 16,
              10, 25,
              15, 35,
            ],
            "heatmap-opacity": [
              "interpolate",
              ["linear"],
              ["zoom"],
              0, 0.6,
              15, 0.3,
            ],
          },
        });
      });
    </script>
  </body>
</html>
