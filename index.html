<!doctype html>
<html lang="en">
  <head>
    <title>Create a heatmap layer</title>
    <meta
      property="og:description"
      content="Visualize earthquake frequency by location using a heatmap layer."
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
      const map = new maplibregl.Map({
        container: "map",
        style:
          "https://api.maptiler.com/maps/basic/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL",
        center: [-120, 50],
        zoom: 2,
      });

      map.on("load", () => {
        map.addSource("history", {
          type: "geojson",
          data: "/history",
        });

        map.addLayer({
          id: "heatmap",
          type: "heatmap",
          source: "history",
          paint: {
            // Since your points don't have a weight property,
            // we'll use a constant weight or interpolate based on zoom
            "heatmap-weight": [
              "interpolate",
              ["linear"],
              ["zoom"],
              0,
              0.1, // min zoom level, base weight
              20,
              1, // max zoom level, max weight
            ],
            "heatmap-color": [
              "interpolate",
              ["linear"],
              ["heatmap-density"],
              0,
              "rgba(0, 0, 255, 0)",
              0.5,
              "rgba(0, 255, 0, 1)",
              1,
              "rgba(255, 0, 0, 1)",
            ],
            "heatmap-radius": 20,
            "heatmap-opacity": 0.6,
          },
        });
      });
    </script>
  </body>
</html>
